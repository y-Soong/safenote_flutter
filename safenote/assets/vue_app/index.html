<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- 개발 중 data:/blob: 미리보기 + Vite HMR(ws/wss) 허용 (최소 완화) -->
    <!--
      connect-src 백엔드 호스트는 IP 고정 대신 "호스트 무관 + 포트 고정" 와일드카드를 쓴다.
        - http://*:8080  = 백엔드 API (release: window.__APP_BASE_URL__ 로 주입되는 LAN IP:8080)
        - https://*:8082 = Vite dev 서버(npm run dev, HTTPS)
      DHCP 로 PC LAN IP 가 바뀌어도 CSP 를 다시 빌드할 필요가 없다. (포트로 스코프 → 전면개방 아님)
      ※ 운영 배포용 하드닝 빌드에서는 실제 운영 도메인으로 다시 고정(pin)할 것.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self' data: blob:;
        img-src 'self' data: blob: https://*.daumcdn.net http://*.daumcdn.net https://*.kakao.com http://*.kakao.com;
        media-src 'self' data: blob:;
        connect-src 'self' http://*:8080 https://*:8082 https://dapi.kakao.com http://dapi.kakao.com https://*.daumcdn.net http://*.daumcdn.net https://*.kakao.com http://*.kakao.com ws: wss:;
        style-src 'self' 'unsafe-inline' https://*.daumcdn.net http://*.daumcdn.net;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://dapi.kakao.com http://dapi.kakao.com https://*.daumcdn.net http://*.daumcdn.net;
      "
    />

    <title>SAFE NOTE</title>
    <script type="module" crossorigin src="/assets/index-mEF2vSg4.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CA40TKTa.css">
  </head>

  <body>
    <div id="app"></div>
    <!-- Vite는 번들을 자동 주입하지 않으므로 엔트리 모듈을 직접 명시한다. -->
  </body>
</html>
